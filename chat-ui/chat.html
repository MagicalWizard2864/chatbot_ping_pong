<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PingPong AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Top Navigation Bar -->
        <nav class="top-nav">
            <div class="nav-brand">
                <div class="brand-icon">
                    <i class="fas fa-bolt"></i>
                </div>
                <span class="brand-text">PingPong</span>
            </div>
            <div class="nav-center">
                <button class="nav-tab active" data-tab="chat">
                    <i class="fas fa-comments"></i>
                    <span>Chat</span>
                </button>
                <button class="nav-tab" data-tab="history">
                    <i class="fas fa-history"></i>
                    <span>History</span>
                </button>
            </div>
            <div class="nav-actions">
                <button class="action-btn" id="themeToggle" title="Toggle theme">
                    <i class="fas fa-adjust"></i>
                </button>
                <button class="action-btn" id="clearChat" title="Clear chat">
                    <i class="fas fa-trash-alt"></i>
                </button>
                <button class="action-btn" id="downloadChat" title="Download chat">
                    <i class="fas fa-download"></i>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Chat Area -->
            <div class="chat-area" id="chatArea">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-card">
                        <div class="welcome-glow"></div>
                        <div class="welcome-avatar">
                            <div class="avatar-ring">
                                <i class="fas fa-robot"></i>
                            </div>
                        </div>
                        <h2 class="welcome-title">Hello, I'm PingPong</h2>
                        <p class="welcome-subtitle">Your AI assistant ready to help. What would you like to explore today?</p>
                        
                        <div class="quick-actions">
                            <button class="quick-action" data-prompt="Explain something interesting">
                                <div class="quick-icon"><i class="fas fa-lightbulb"></i></div>
                                <span>Teach me something</span>
                            </button>
                            <button class="quick-action" data-prompt="Help me write code">
                                <div class="quick-icon"><i class="fas fa-code"></i></div>
                                <span>Write code</span>
                            </button>
                            <button class="quick-action" data-prompt="Answer my question">
                                <div class="quick-icon"><i class="fas fa-question"></i></div>
                                <span>Ask question</span>
                            </button>
                            <button class="quick-action" data-prompt="Brainstorm ideas with me">
                                <div class="quick-icon"><i class="fas fa-brain"></i></div>
                                <span>Brainstorm</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Messages Container -->
                <div class="messages-container" id="messagesContainer">
                    <div class="messages-wrapper" id="messagesWrapper">
                        <!-- Messages will appear here -->
                    </div>
                </div>

                <!-- Typing Indicator -->
                <div class="typing-container" id="typingContainer">
                    <div class="typing-message">
                        <div class="typing-avatar">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="typing-content">
                            <div class="typing-bubble">
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- History Panel -->
            <div class="history-panel hidden" id="historyPanel">
                <div class="history-header">
                    <h3>Conversation History</h3>
                    <button class="clear-history-btn" id="clearHistory">
                        <i class="fas fa-trash"></i> Clear All
                    </button>
                </div>
                <div class="history-list" id="historyList">
                    <!-- History items will be added dynamically -->
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-area">
            <div class="input-card">
                <div class="input-row">
                    <button class="input-action" id="attachBtn" title="Attach file">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <div class="textarea-wrapper">
                        <textarea 
                            class="message-input" 
                            id="messageInput" 
                            placeholder="Message PingPong..." 
                            rows="1"
                        ></textarea>
                        <span class="char-count" id="charCount">0</span>
                    </div>
                    <button class="send-btn" id="sendBtn" title="Send message">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <p class="input-hint">PingPong can make mistakes. Consider checking important information.</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts-ui/scripts.js"></script>
</body>

</html>
